version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacy_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharmacy_erp}
      POSTGRES_USER: ${POSTGRES_USER:-pharmacy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacy_secure_password_123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pharmacy_user} -d ${POSTGRES_DB:-pharmacy_erp}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pharmacy_network

  redis:
    image: redis:7-alpine
    container_name: pharmacy_erp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_password_123}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secure_password_123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmacy_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pharmacy_erp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pharmacy_user}:${POSTGRES_PASSWORD:-pharmacy_secure_password_123}@postgres:5432/${POSTGRES_DB:-pharmacy_erp}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password_123}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: ${BACKEND_PORT:-4000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend_uploads:/app/uploads
    networks:
      - pharmacy_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: pharmacy_erp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Pharmacy ERP}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - pharmacy_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  pharmacy_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
